# CultBot with Docker Compose (Option D) - best for non-Pi home servers / NAS.
#
# Quick start:
#   1. cp .env.example .env && cp cultbot.config.example.yaml cultbot.config.yaml
#   2. Fill in CURL_COMMAND in .env and preferences in cultbot.config.yaml.
#   3. Optionally add TZ=Your/Zone to .env so scheduled times match local time.
#   4. docker compose build
#   5. docker compose run --rm cultbot                 # book once now
#   6. docker compose run --rm cultbot book --dry-run  # preview only
#
# Scheduling: this service runs once and exits (restart: "no"). Trigger it on a
# schedule from the host - e.g. a cron/systemd entry that calls
# `docker compose run --rm cultbot` - or from your platform's own scheduler.

services:
  cultbot:
    build: .
    image: cultbot:latest
    # Load secrets from .env.
    env_file:
      - .env
    # Mount the non-secret YAML configuration read by CultBot.
    volumes:
      - ./cultbot.config.yaml:/app/cultbot.config.yaml:ro
    environment:
      # Container time zone, so log/schedule times match your local clock.
      TZ: ${TZ:-Asia/Kolkata}
    # One-shot: do not restart after the booking pass exits.
    restart: "no"
