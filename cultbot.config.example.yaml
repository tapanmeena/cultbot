# All center IDs, workout names, times, and dates below are examples.
# Run the list-centers, list-workouts, and list-slots commands, then replace
# these values with options available for your Cult.fit account.
version: 1

booking:
  date: last
  dryRun: false
  maxRetries: 3
  retryDelayMs: 1000

logging:
  level: info

default:
  centers: [1001]
  slots: ["07:00", "08:00"]
  workouts:
    - "YOGA"
  enableWaitlist: true

# Profiles and calendar rules are optional. Unlisted days use default.
profiles:
  weekend:
    centers: [2001, 1001]
    timeRange: "09:00-12:00"
    workouts:
      - "DANCE FITNESS"
      - "YOGA"

weekly:
  saturday:
    profile: weekend
  sunday:
    skip: true

# Exact dates override weekly rules.
dates:
  "2026-07-19":
    profile: default
  "2026-07-20":
    skip: true

# selectionOrder is optional. The default is:
# selectionOrder: [times, centers, workouts]
