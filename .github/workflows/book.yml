name: Book Cult.fit Class

on:
  # Runs daily. Cult.fit typically opens the next booking window at a fixed
  # time, so adjust this cron to a minute or two after it opens for you.
  # This runs at 16:31 UTC (22:01 / 10:01 PM IST). Cron is always in UTC.
  schedule:
    - cron: '31 16 * * *'
  # Lets you trigger a run manually from the GitHub Actions tab.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only (do not actually book)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The scheduled run is opt-in so it never competes with a self-hosted
    # scheduler (systemd timer, cron, or Docker). Set a repository variable
    # ENABLE_GITHUB_SCHEDULE=true (Settings > Secrets and variables > Actions >
    # Variables) to let the daily cron actually book. Manual runs started from
    # the Actions tab (workflow_dispatch) always work, so you can still test.
    if: github.event_name != 'schedule' || vars.ENABLE_GITHUB_SCHEDULE == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Book class
        env:
          # Required secret: the full curl command copied from Cult.fit.
          CURL_COMMAND: ${{ secrets.CURL_COMMAND }}
          # Complete non-secret YAML configuration stored as one multiline repository variable.
          CULTBOT_CONFIG_YAML: ${{ vars.CULTBOT_CONFIG_YAML }}
          # Optional notification secrets (leave unset to disable).
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node index.js book --dry-run
          else
            node index.js book
          fi
